<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hima Chababi — Connexion Admin</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="title">هيما شبابي</div>
        <div class="subtitle">Hima Chababi · Interface Administration</div>
      </div>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/admin/login">
        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" id="username" name="username" placeholder="admin1" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
          Se connecter
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:12px;color:#9E9E9E">
        Accès réservé aux administrateurs de l'association
      </p>
    </div>
  </div>
</body>
</html>
